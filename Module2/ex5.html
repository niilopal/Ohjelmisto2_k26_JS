<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ex5</title>
</head>
<body>
<script>
  let x = 0
  const nums = []
  while (x === 0) {
    let num = parseInt(prompt("Enter a number:"))
    switch (nums.includes(num)) {
      case true:
        alert("Number already entered.");
        nums.sort(function(a, b) {return a-b})
        for (let i = 0; i < nums.length; i++) {
          console.log(nums[i])
        }
        x = 1;
        break;
      case false:
        nums.push(num)

    }
  }
</script>
</body>
</html>
