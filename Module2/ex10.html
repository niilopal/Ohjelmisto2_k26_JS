<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ex10</title>
</head>
<body>
<script>
    let candidates = []
    let round = parseInt(prompt("Enter number of candidates:"))
    for (let i = 0; i < round; i++) {
        let number = i + 1
        candidates.push({
            name: prompt("Enter name for candidate " + number),
            votes: 0,})
    }
    let round1 = parseInt(prompt("Enter number of voters:"))
    for (let i = 0; i < round1; i++) {
        let number = i + 1
        let vote = prompt("Voter number " + number + ", please enter name of candidate to vote for:")
        for (let i = 0; i < round; i++) {
            switch (candidates[i]['name']) {
                case vote:
                    candidates[i]['votes']++;
                    break;
            }
        }
    }
    candidates = candidates.sort(function (a, b) {return b.votes - a.votes})
    console.log("The winner is " + candidates[0]['name'] + " with " + candidates[0]['votes'] + " votes")
    console.log("Results:")
    for (let i = 0; i < round; i++) {
        console.log(candidates[i]['name'] + ": " + candidates[i]['votes'] + " votes")
    }
</script>
</body>
</html>
