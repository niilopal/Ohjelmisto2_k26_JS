<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ex4</title>
</head>
<body>
<script>
    const nums = []
    let x = 0
    while (x === 0) {
        let num = (parseInt(prompt("Enter a number or zero to stop:")))
        switch (num) {
            case 0:
                x = 1;
                break;
            default:
                nums.push(num)
        }
    }
    nums.sort(function(a, b){return a - b})
    for (let i = 0; i < nums.length; i++) {
        console.log(nums[i])
    }
</script>
</body>
</html>
