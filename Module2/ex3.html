<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ex3</title>
</head>
<body id="result">
<script>
    let dogs = []
    for (let i = 0; i < 6; i++) {
        dogs.push(prompt("Enter the name of a dog:"))
    }
    dogs = dogs.sort()
    dogs = dogs.reverse()
    const ul = document.createElement('ul')
    for (let i = 0; i < dogs.length; i++) {
        let li = document.createElement('li')
        li.textContent = dogs[i]
        ul.appendChild(li)
    }
    document.querySelector('#result').appendChild(ul)
</script>
</body>
</html>
