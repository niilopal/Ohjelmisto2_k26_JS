<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ex6</title>
</head>
<body id="result">
<script>
  let x = 0
  const ul = document.createElement('ul')
  rolls = []
  function roll() {
    return Math.floor(Math.random() * 6) + 1
  }
  while (x === 0) {
    let num = roll()
    switch (num) {
      case 6:
        rolls.push(num);
        x = 1;
        break;
      default:
        rolls.push(num);
        break;
    }
  }
  for (let i = 0; i < rolls.length; i++) {
    let li = document.createElement('li')
    li.textContent = rolls[i]
    ul.appendChild(li)
  }
  document.querySelector('#result').appendChild(ul)
</script>
</body>
</html>
