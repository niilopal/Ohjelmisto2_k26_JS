<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ex3</title>
</head>
<body>
<p id="sum"></p>
<p id="prod"></p>
<p id="avg"></p>
<script>
    let num0 = parseInt(prompt("Enter first number:"))
    let num1 = parseInt(prompt("Enter second number:"))
    let num2 = parseInt(prompt("Enter third number:"))
    let sum = num0 + num1 + num2
    let avg = sum / 3
    let prod = num0 * num1 * num2
    document.querySelector('#sum').innerHTML = "Sum of the numbers: " + sum
    document.querySelector('#prod').innerHTML = "Product of the numbers: " + prod
    document.querySelector('#avg').innerHTML = "Average of the numbers: " + avg
</script>
</body>
</html>
